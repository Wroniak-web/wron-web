name: Parse Jobs Daily

on:
  workflow_dispatch: # Позволяет запускать вручную

permissions:
  contents: write # Права на запись в репозиторий

jobs:
  parse-jobs:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'
          
      - name: Install dependencies
        run: |
          npm ci --prefer-offline --no-audit --no-fund
          
      - name: Install Puppeteer dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable fonts-ipafont-gothic fonts-wqy-zenhei fonts-thai-tlwg fonts-kacst fonts-freefont-ttf
          
      - name: Parse jobs
        run: |
          timeout 10m npm run parse || echo "Parse job timed out after 10 minutes"
          
      - name: Check for changes
        id: verify-changed-files
        run: |
          echo "Checking for changes in data files..."
          git status --porcelain
          if [ -n "$(git status --porcelain)" ]; then
            echo "✅ Changes detected"
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "❌ No changes detected"
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
          
      - name: Commit and push changes
        if: steps.verify-changed-files.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add src/data/ || true
          git add yarn.lock || true
          git commit -m "🤖 Auto-update jobs data - $(date '+%Y-%m-%d %H:%M')" || exit 0
          
          # Принудительно пушим изменения
          echo "Pushing changes to GitHub..."
          git push origin main --force-with-lease || {
            echo "Push failed, trying to pull and push again..."
            git pull origin main --rebase || git pull origin main --strategy=ours || true
            git push origin main
          }
          
      - name: Deploy to Vercel
        if: steps.verify-changed-files.outputs.changed == 'true'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          
      - name: Create summary
        run: |
          echo "## 📊 Jobs Parsing Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ steps.verify-changed-files.outputs.changed == 'true' && '✅ Updated and Deployed' || 'ℹ️ No changes' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "src/data/all-jobs.json" ]; then
            TOTAL_JOBS=$(cat src/data/all-jobs.json | jq '.totalCount // 0')
            echo "**Total jobs:** $TOTAL_JOBS" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Sources:" >> $GITHUB_STEP_SUMMARY
          for file in src/data/*-jobs.json; do
            if [ -f "$file" ]; then
              SOURCE=$(basename "$file" -jobs.json)
              COUNT=$(cat "$file" | jq '.count // 0')
              echo "- **$SOURCE:** $COUNT jobs" >> $GITHUB_STEP_SUMMARY
            fi
          done
